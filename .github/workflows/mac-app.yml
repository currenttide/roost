# Roost for Mac — CI (DESIGN.md §11)
# RoostKit (client + models) tests run on Linux for every PR touching mac-app;
# the full app type-checks and builds on a macOS runner.
name: mac-app

on:
  push:
    branches: [master]
    paths: ["mac-app/**", ".github/workflows/mac-app.yml"]
  pull_request:
    paths: ["mac-app/**", ".github/workflows/mac-app.yml"]

jobs:
  roostkit-linux:
    name: RoostKit tests (Linux)
    runs-on: ubuntu-22.04
    container: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: swift test
        working-directory: mac-app
        run: swift test

  app-macos:
    name: App build + tests (macOS)
    # macos-15's default Xcode (16.4 → Swift 6.1) satisfies the Swift tools >= 6.0
    # that SwiftTerm 1.13's transitive swift-argument-parser 1.8.2 manifest requires.
    # macos-14 defaults to Xcode 15.4 (Swift 5.10), which dies at dependency
    # resolution before ever compiling the app (R92). Our own manifest stays
    # swift-tools-version:5.10 — a newer toolchain builds it fine, so this is a
    # toolchain unblock, not a language-mode (Swift 6 concurrency) migration.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        working-directory: mac-app
        run: swift build
      - name: swift test
        working-directory: mac-app
        run: swift test
      - name: assemble Roost.app
        working-directory: mac-app
        run: ./scripts/build.sh
