# XcodeGen spec — generates Roost.xcodeproj. We do NOT hand-write the pbxproj.
#   brew install xcodegen && xcodegen generate
#
# WHY XcodeGen: the .xcodeproj is a generated artifact (gitignored); the source
# of truth is this small YAML + the Swift files. Keeps the repo diffable.
name: Roost
options:
  bundleIdPrefix: rs.roost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""            # set your team to run on-device
    CODE_SIGN_STYLE: Automatic

targets:
  Roost:
    type: application
    platform: iOS
    sources:
      - path: Roost
    info:
      path: Roost/Info.plist
      properties:
        CFBundleDisplayName: Roost
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # --- Permission strings (mic + speech for dictation) ---
        NSMicrophoneUsageDescription: >-
          Roost uses the microphone for hold-to-talk dictation so you can speak
          a job instead of typing it. Audio is transcribed on-device.
        NSSpeechRecognitionUsageDescription: >-
          Roost transcribes your speech on-device to turn spoken intents into
          jobs. Nothing is sent to Apple when on-device recognition is available.
        # --- Local network: the control plane is plain http on the LAN ---
        NSLocalNetworkUsageDescription: >-
          Roost connects to your control plane on the local network to show the
          fleet and stream job logs.
        # Scope the cleartext exception as narrowly as Apple allows: only local
        # networking, NOT NSAllowsArbitraryLoads. Public/tunnel hosts that are
        # HTTPS work unchanged; a plain-http LAN host is permitted by this.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # --- roost:// URL scheme (pairing deep link from the QR) ---
        CFBundleURLTypes:
          - CFBundleURLName: rs.roost.pair
            CFBundleURLSchemes:
              - roost
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: rs.roost.mobile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"      # iPhone only (DESIGN: no iPad in v1)

  RoostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoostTests
      # Bundle the golden fixtures into the test target by REFERENCE to the
      # single repo copy in ../fixtures — one source of truth, copied at build
      # time only. (XcodeGen models resources as a sources entry with
      # buildPhase: resources; there is no top-level `resources:` key.)
      - path: ../fixtures
        buildPhase: resources
        type: folder
    dependencies:
      - target: Roost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rs.roost.mobile.tests
        GENERATE_INFOPLIST_FILE: YES

  # UI smoke suite (R84). XCUITest drives the real app via the accessibility
  # tree — no app source is linked in; it talks to the app over the automation
  # bridge. The smoke flows pair via launch-arg, assert live dashboard data,
  # open the New-session sheet, push into a Session, and open the
  # Notifications/Schedules sheets. Runs headless on the Mac node via
  # `xcodebuild test` (see README "UI smoke suite").
  RoostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoostUITests
    dependencies:
      - target: Roost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rs.roost.mobile.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Roost

schemes:
  Roost:
    build:
      targets:
        Roost: all
        RoostTests: [test]
    test:
      targets:
        - RoostTests
  # Dedicated UI scheme so `xcodebuild test -scheme RoostUI` runs only the
  # XCUITest smoke flows (the unit scheme stays fast and host-free). Result
  # bundles + automatic screenshots come from this scheme's runs.
  RoostUI:
    build:
      targets:
        Roost: all
        RoostUITests: [test]
    test:
      targets:
        - RoostUITests
