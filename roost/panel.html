<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Roost Fleet</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0d13; --panel:#0f131c; --panel2:#11161f; --line:#1b2230;
    --ink:#d7dde8; --dim:#8b95a7; --faint:#5f6b80; --mute:#46506310;
    --ok:#34d399; --okd:#0c2a1d; --warn:#fbbf24; --warnd:#2c2410;
    --bad:#f87171; --badd:#311216; --blue:#7fb8ff; --purp:#c4a8ff; --amber:#ffc777;
    --radius:10px;
  }
  * { box-sizing: border-box; }
  html,body { height:100%; }
  body {
    margin:0; font:12px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #121a2a 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #16121f 0%, transparent 55%),
      var(--bg);
    color:var(--ink); -webkit-user-select:none; user-select:none;
    -webkit-font-smoothing:antialiased;
  }

  /* L0 — fleet verdict bar (the one glance) */
  #verdict {
    position:sticky; top:0; z-index:6; padding:11px 14px; font-weight:650; letter-spacing:.2px;
    display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line);
    background:var(--panel2); backdrop-filter:blur(8px);
  }
  #verdict.ok    { background:linear-gradient(180deg,#0c2a1d,#0b150f); color:#86f3c5; }
  #verdict.warn  { background:linear-gradient(180deg,#2c2410,#171208); color:#fcd96b; }
  #verdict.alert { background:linear-gradient(180deg,#3a141a,#1c0b0d); color:#ff9aa2; }
  #verdict .vdot { width:10px; height:10px; border-radius:50%; flex:none; }
  .ok    .vdot { background:var(--ok);   box-shadow:0 0 10px var(--ok); }
  .warn  .vdot { background:var(--warn); box-shadow:0 0 10px var(--warn); animation:pulse 1.8s infinite; }
  .alert .vdot { background:var(--bad);  box-shadow:0 0 12px var(--bad); animation:pulse 1s infinite; }
  #vtext { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #attn { font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; flex:none;
          background:#7a262e44; color:#ffb3b9; border:1px solid #7a262e; display:none; }
  #attn.show { display:inline-block; }

  header {
    padding:8px 14px; background:#0c0f17cc; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; flex-wrap:wrap; color:var(--dim);
  }
  header .stat { display:flex; align-items:baseline; gap:5px; }
  header b { color:var(--ink); font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; }
  header .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--faint); }
  header .busy { margin-left:auto; color:var(--warn); font-weight:650; }
  header .busy .pip { display:inline-block; width:7px; height:7px; border-radius:50%;
                      background:var(--warn); box-shadow:0 0 8px var(--warn); margin-right:5px;
                      animation:pulse 1.4s infinite; vertical-align:middle; }

  .wrap { display:grid; grid-template-columns:1fr; }
  @media (min-width:760px) { .wrap { grid-template-columns:1.35fr 1fr; align-items:start; } }

  h2 { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--faint);
       margin:14px 14px 6px; font-weight:700; display:flex; align-items:center; gap:8px; }
  h2::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); }

  #tasks, #grid { display:grid; grid-template-columns:1fr; gap:7px; padding:0 10px 4px; }
  @media (min-width:760px) { #grid { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); } }

  /* task board rows — read as a story */
  .task {
    border:1px solid var(--line); border-radius:var(--radius); padding:8px 10px; background:var(--panel);
    display:flex; flex-direction:column; gap:5px; position:relative; overflow:hidden;
    transition:border-color .2s, box-shadow .2s;
  }
  .task::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; }
  .task.active { border-color:#26405f; }
  .task.active::before { background:var(--blue); box-shadow:0 0 10px #2f6cb0aa; }
  .task.bad { border-color:#5b2026; box-shadow:0 0 16px #f8717115; }
  .task.bad::before { background:var(--bad); box-shadow:0 0 10px #f87171aa; }
  .task.good::before { background:var(--ok); }
  .trow { display:flex; align-items:center; gap:7px; min-width:0; }
  .goal { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .pill { font-size:9.5px; padding:2px 8px; border-radius:999px; white-space:nowrap; font-weight:700;
          letter-spacing:.4px; text-transform:uppercase; flex:none; }

  /* phase pills */
  .p-running, .p-assigned    { color:#bfe0ff; background:#13263d; }
  .p-verifying               { color:#dcc7ff; background:#241a3a; }
  .p-self-healing            { color:#ffd9a8; background:#33240f; }
  .p-verified, .p-done,
  .p-succeeded               { color:#04231a; background:var(--ok); }
  .p-queued, .p-cancelled    { color:#9fb0c9; background:transparent; border:1px solid #2a3346; }
  .p-waiting                 { color:#fcd96b; background:#2c2410; }
  .p-unplaceable, .p-failed,
  .p-unverified, .p-stuck    { color:#1c0b0d; background:var(--bad); }
  /* health pills (slightly softer fills) */
  .h-running, .h-assigned    { color:var(--blue);  background:#13263d; }
  .h-verifying               { color:var(--purp);  background:#241a3a; }
  .h-self-healing            { color:var(--amber); background:#33240f; }
  .h-verified                { color:#04231a; background:var(--ok); }
  .h-queued, .h-cancelled    { color:#9fb0c9; background:transparent; border:1px solid #2a3346; }
  .h-waiting                 { color:#fcd96b; background:#2c2410; }
  .h-unplaceable, .h-failed,
  .h-unverified, .h-stuck    { color:#1c0b0d; background:var(--bad); }

  .cost { font-size:10px; color:var(--faint); margin-left:auto; white-space:nowrap; flex:none;
          font-variant-numeric:tabular-nums; }
  .elapsed { font-size:10px; color:var(--faint); white-space:nowrap; flex:none; font-variant-numeric:tabular-nums; }
  .narr { color:var(--blue); font-size:10.5px; white-space:nowrap; overflow:hidden;
          text-overflow:ellipsis; flex:1; min-width:0; opacity:.92; }
  .narr.evi { color:#7fe0b0; } .narr.err { color:#ff9aa2; }
  .who { font-size:10px; color:var(--dim); white-space:nowrap; flex:none;
         padding:1px 7px; border-radius:6px; background:#161c28; }
  .ago { font-size:10px; color:var(--faint); white-space:nowrap; flex:none; }

  /* node cards */
  .node { border:1px solid var(--line); border-radius:var(--radius); padding:8px 10px; background:var(--panel);
          display:flex; flex-direction:column; gap:5px; position:relative; overflow:hidden;
          transition:border-color .2s, box-shadow .2s; }
  .node.busy { border-color:#7a5410; box-shadow:0 0 14px #f59e0b18; }
  .node::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; }
  .node.busy::before { background:var(--amber); box-shadow:0 0 10px #f59e0baa; }
  .row1 { display:flex; align-items:center; gap:7px; }
  .name { font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge { font-size:9.5px; padding:1px 7px; border-radius:6px; border:1px solid #2a3346; color:#9fb0c9;
           white-space:nowrap; flex:none; font-weight:600; }
  .badge.gpu { color:#7ff0c0; border-color:#134e3a; background:#0b231b; }
  .npill { font-size:9.5px; padding:2px 8px; border-radius:999px; margin-left:auto; font-weight:700;
           letter-spacing:.4px; flex:none; }
  .npill.idle { color:var(--faint); border:1px solid #2a3346; }
  .npill.busy { color:#1c0b0d; background:var(--warn); animation:pulse 1.6s infinite; }
  .npill.stale { color:#9fb0c9; border:1px solid #3a2a2a; background:#1f1416; }
  .npill.offline { color:#7f8aa0; border:1px solid #2a3346; background:#141821; }
  .node.offline { opacity:.55; }
  .meta { color:var(--dim); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta .sep { color:#374152; margin:0 5px; }
  .ntask { color:#e8c98b; font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
           display:flex; align-items:center; gap:5px; }
  .ntask .run { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--amber);
                box-shadow:0 0 8px var(--amber); animation:pulse 1.2s infinite; flex:none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .empty { color:var(--faint); padding:18px 12px; text-align:center; font-size:11px;
           border:1px dashed var(--line); border-radius:var(--radius); margin:0 10px; }
  .empty b { color:var(--dim); }
  footer { color:var(--faint); font-size:10px; padding:10px 14px 14px; text-align:center;
           font-variant-numeric:tabular-nums; }
  footer .dot { color:var(--ok); }
  footer.stale { color:var(--warn); }
</style>
</head>
<body>
<div id="verdict" class="warn">
  <span class="vdot"></span>
  <span id="vtext">connecting…</span>
  <span id="attn"></span>
</div>
<header>
  <div class="stat"><b id="nworkers">–</b><span class="lbl">nodes</span></div>
  <div class="stat"><b id="ncores">–</b><span class="lbl">cores</span></div>
  <div class="stat"><b id="ngpus">–</b><span class="lbl">gpus</span></div>
  <span class="busy" id="nbusy"></span>
</header>
<div class="wrap">
  <section>
    <h2 id="tasks-h">Tasks</h2>
    <div id="tasks"></div>
  </section>
  <section>
    <h2>Nodes</h2>
    <div id="grid"></div>
  </section>
</div>
<footer id="foot">connecting…</footer>
<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";
const H = TOKEN ? { Authorization: "Bearer " + TOKEN } : {};
const FRESH = 45;
const OFFLINE_SHOW = 2 * 86400;   // still show a node that went offline within ~2 days
const ACTIVE = new Set(["running","assigned","queued","verifying","self-healing"]);
const BAD = new Set(["unplaceable","failed","unverified","stuck?","stuck"]);

// self-heal state: a stale frame (sleep/wake, dropped CP) should recover on its own
let fails = 0, lastOk = Date.now();
const STALE_MS = 12000;   // surface a staleness warning after this long with no fresh data
const RELOAD_MS = 60000;  // hard self-heal: reload the page after this long stuck

const $ = (id) => document.getElementById(id);

/* escape any untrusted text before it touches innerHTML */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
/* phase/status -> css class suffix (strip non-word chars) */
function cls(s) { return String(s || "").toLowerCase().replace(/[^a-z]+/g, "-").replace(/^-|-$/g, ""); }
function clip(s, n) { s = String(s || "").replace(/\s+/g, " ").trim(); return s.length > n ? s.slice(0, n - 1) + "…" : s; }

function ago(ts) {
  if (!ts) return "";
  const s = Math.max(0, Math.floor(Date.now() / 1000 - ts));
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}
function elapsed(ts) {
  if (!ts) return "";
  const s = Math.max(0, Math.floor(Date.now() / 1000 - ts));
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s / 60) + "m" + String(s % 60).padStart(2, "0") + "s";
  return Math.floor(s / 3600) + "h" + String(Math.floor(s / 60) % 60).padStart(2, "0") + "m";
}
function gpuLabel(c) {
  const n = c.gpu_count || 0;
  if (n) return n + "× " + String((c.gpu && c.gpu[0]) || "GPU").replace("NVIDIA ", "").replace("GeForce ", "");
  if (c.docker_gpu) return "GPU (docker)";
  return "";
}
function costLabel(cost) {
  if (!cost) return "";
  const t = cost.tokens_used || 0;
  const usd = cost.cost_est_usd || 0;
  if (!t && !usd && cost.budget_pct == null) return "";
  const tk = t >= 1000 ? (t / 1000).toFixed(1) + "k" : t;
  let s = "~$" + usd.toFixed(3) + (t ? " · " + tk + " tok" : "");
  if (cost.budget_pct != null) s += " · " + cost.budget_pct + "%";
  return s;
}
function nameOf(workers, id) {
  const w = workers.find((x) => x.id === id);
  return w ? w.name : (id ? id.slice(0, 8) : "");
}

async function tick() {
  try {
    const r = await fetch("/derived?limit=40", { headers: H });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const workers = Array.isArray(d.workers) ? d.workers : [];
    const runs = Array.isArray(d.runs) ? d.runs : [];

    // L0 verdict bar
    const v = d.fleet_verdict || { level: "ok", summary: "" };
    const vb = $("verdict");
    vb.className = ["ok", "warn", "alert"].includes(v.level) ? v.level : "ok";
    $("vtext").textContent = v.summary || (v.level === "ok" ? "all systems nominal" : "");

    // header counts (live = recently-seen or currently busy)
    const now = Date.now() / 1000;
    const live = workers.filter((w) => (now - (w.last_seen || 0)) < FRESH || w.status === "busy");
    // expected-but-offline nodes (seen recently enough to still matter) — surfaced
    // for attention rather than silently dropped
    const offline = workers.filter(
      (w) => !live.includes(w) && (now - (w.last_seen || 0)) < OFFLINE_SHOW);
    let cores = 0, gpus = 0, busy = 0;
    live.forEach((w) => {
      const c = w.capabilities || {};
      cores += c.cpus || 0; gpus += c.gpu_count || 0;
      if (w.status === "busy") busy++;
    });
    $("nworkers").textContent = live.length;
    $("ncores").textContent = cores;
    $("ngpus").textContent = gpus;
    $("nbusy").innerHTML = busy ? '<span class="pip"></span>' + busy + " working" : "";

    // task board — active first, then most-recent; tally attention items
    const board = runs.filter((x) => x && x.goal);
    let attn = 0;
    board.forEach((t) => { if (BAD.has((t.health && t.health.status) || t.phase)) attn++; });
    const attnEl = $("attn");
    attnEl.textContent = attn ? attn + " need" + (attn === 1 ? "s" : "") + " attention" : "";
    attnEl.classList.toggle("show", attn > 0);

    board.sort((a, b) => {
      const aa = ACTIVE.has(a.phase) ? 0 : 1, bb = ACTIVE.has(b.phase) ? 0 : 1;
      if (aa !== bb) return aa - bb;
      return (b.created_at || 0) - (a.created_at || 0);
    });

    const tb = $("tasks");
    $("tasks-h").textContent = "Tasks (" + board.length + ")";
    if (!board.length) {
      tb.innerHTML = '<div class="empty">no recent tasks<br>say <b>roost do "…"</b> to run one</div>';
    } else {
      let html = "";
      for (const t of board.slice(0, 24)) {
        const phase = t.phase || "queued";
        const h = t.health || { status: phase, reason: "" };
        const hstatus = h.status || phase;
        const isBad = BAD.has(hstatus);
        const isActive = ACTIVE.has(phase);
        const isGood = phase === "verified" || phase === "succeeded";
        const klass = "task" + (isBad ? " bad" : isActive ? " active" : isGood ? " good" : "");

        // narration reads as the story line: result on success, reason on failure, live narration otherwise
        let narr, ncls;
        if (isGood) { narr = t.evidence || t.result || "verified"; ncls = "evi"; }
        else if (isBad) { narr = h.reason || t.result || "needs attention"; ncls = "err"; }
        else { narr = t.narration || h.reason || ""; ncls = ""; }

        const cost = costLabel(t.cost);
        const elapsedTxt = isActive && t.created_at ? elapsed(t.created_at) : "";
        const who = t.worker ? nameOf(workers, t.worker) : "";

        html +=
          '<div class="' + klass + '">' +
            '<div class="trow">' +
              '<span class="pill p-' + cls(phase) + '">' + esc(phase) + '</span>' +
              '<span class="goal">' + esc(t.goal) + '</span>' +
              (cost ? '<span class="cost">' + esc(cost) + '</span>'
                    : (elapsedTxt ? '<span class="elapsed">' + esc(elapsedTxt) + '</span>' : '')) +
            '</div>' +
            '<div class="trow">' +
              '<span class="pill h-' + cls(hstatus) + '">' + esc(hstatus) + '</span>' +
              (who ? '<span class="who">' + esc(who) + '</span>' : '') +
              (narr ? '<span class="narr ' + ncls + '">' + esc(clip(narr, 160)) + '</span>'
                    : '<span class="narr"></span>') +
              (t.created_at ? '<span class="ago">' + esc(ago(t.created_at)) + '</span>' : '') +
            '</div>' +
            // agentic root-cause on a failed job (worker-reported diagnosis)
            (isBad && t.diagnosis
              ? '<div class="trow"><span class="narr err">why: ' +
                esc(clip(t.diagnosis, 300)) + '</span></div>'
              : '') +
          '</div>';
      }
      tb.innerHTML = html;
    }

    // node cards — busy first (by current job), then by core count
    const cur = {};
    for (const t of runs) if (ACTIVE.has(t.phase) && t.worker) cur[t.worker] = t;
    live.sort((a, b) => {
      const ab = (a.status === "busy" || cur[a.id]) ? 1 : 0;
      const bb = (b.status === "busy" || cur[b.id]) ? 1 : 0;
      if (ab !== bb) return bb - ab;
      return ((b.capabilities || {}).cpus || 0) - ((a.capabilities || {}).cpus || 0);
    });

    const grid = $("grid");
    {
      let html = "";
      for (const w of live) {
        const c = w.capabilities || {};
        const job = cur[w.id];
        const isBusy = w.status === "busy" || !!job;
        const stale = (now - (w.last_seen || 0)) >= FRESH && !isBusy;
        const gl = gpuLabel(c);
        const load = c.load || {};

        let detail;
        if (job) {
          detail = '<div class="ntask"><span class="run"></span>' + esc(clip(job.goal, 80)) + '</div>';
        } else {
          const bits = [(c.cpus || 0) + " cores"];
          if (gl) bits.push(esc(gl));
          if (load.free_vram_gb != null) bits.push(load.free_vram_gb + "GB free");
          if (load.loadavg1 != null) bits.push("load " + Number(load.loadavg1).toFixed(1));
          detail = '<div class="meta">' + bits.join('<span class="sep">·</span>') + '</div>';
        }

        // Capacity-aware status: a multi-slot worker shows "N/M" running so a
        // partially-loaded (still-assignable) node reads as available, not idle.
        const cap = w.capacity || 1;
        const running = w.running != null ? w.running : (isBusy ? cap : 0);
        const pillCls = isBusy ? "busy" : stale ? "stale" : "idle";
        let pillTxt = isBusy ? "BUSY" : stale ? "STALE" : "idle";
        if (cap > 1) pillTxt = running + "/" + cap;
        html +=
          '<div class="node' + (isBusy ? " busy" : "") + '">' +
            '<div class="row1">' +
              '<span class="name">' + esc(w.name) + '</span>' +
              '<span class="badge ' + (c.gpu_count || c.docker_gpu ? "gpu" : "") + '">' +
                esc(gl || (c.cpus || 0) + "c") + '</span>' +
              '<span class="npill ' + pillCls + '">' + esc(pillTxt) + '</span>' +
            '</div>' + detail +
          '</div>';
      }
      for (const w of offline) {
        const c = w.capabilities || {};
        const gl = gpuLabel(c);
        html +=
          '<div class="node offline">' +
            '<div class="row1">' +
              '<span class="name">' + esc(w.name) + '</span>' +
              '<span class="badge ' + (c.gpu_count || c.docker_gpu ? "gpu" : "") + '">' +
                esc(gl || (c.cpus || 0) + "c") + '</span>' +
              '<span class="npill offline">offline</span>' +
            '</div>' +
            '<div class="meta">last seen ' + esc(ago(w.last_seen)) + '</div>' +
          '</div>';
      }
      grid.innerHTML = html || '<div class="empty">no workers reachable</div>';
    }

    fails = 0; lastOk = Date.now();
    const gen = d.generated_at ? ago(d.generated_at) : "just now";
    const foot = $("foot");
    foot.classList.remove("stale");
    foot.innerHTML = '<span class="dot">●</span> live · updated ' +
      new Date().toLocaleTimeString() + " · data " + esc(gen);
  } catch (e) {
    fails++;
    const vb = $("verdict");
    vb.className = "alert";
    $("vtext").textContent = "control plane unreachable — " + esc(e.message || e);
    $("attn").classList.remove("show");
    $("foot").textContent = "retrying…";
  }
}
tick();
setInterval(tick, 1500);

// self-heal watchdog: if no fresh data for a while (sleep/wake, dropped CP, a
// wedged frame), show a staleness warning, then hard-reload to recover.
setInterval(() => {
  const age = Date.now() - lastOk;
  if (age > RELOAD_MS) { location.reload(); return; }
  if (age > STALE_MS) {
    const foot = $("foot");
    foot.classList.add("stale");
    foot.textContent = "⚠ data " + Math.floor(age / 1000) + "s old · reconnecting…";
  }
}, 1000);
// recover immediately when the window is shown again (the interval is throttled
// while hidden, so the visible frame can be stale on wake)
document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(); });
window.addEventListener("focus", tick);
</script>
</body>
</html>
