<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Roost Fleet</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 12px/1.35 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: #0b0e14; color: #d7dde8; -webkit-user-select: none; user-select: none;
  }
  /* L0 — fleet verdict bar (the one glance) */
  #verdict {
    position: sticky; top: 0; z-index: 6; padding: 9px 12px; font-weight: 650; letter-spacing:.2px;
    display:flex; align-items:center; gap:9px; border-bottom:1px solid #1c2230;
    background:#11151f;
  }
  #verdict.ok    { background: linear-gradient(180deg,#0c2a1d,#0b1a14); color:#7ff0c0; }
  #verdict.warn  { background: linear-gradient(180deg,#2c2410,#1a160b); color:#fcd96b; }
  #verdict.alert { background: linear-gradient(180deg,#311216,#1c0e10); color:#ff9aa2; }
  #verdict .vdot { width:9px;height:9px;border-radius:50%; }
  .ok .vdot{background:#34d399;box-shadow:0 0 8px #34d399}
  .warn .vdot{background:#fbbf24;box-shadow:0 0 8px #fbbf24}
  .alert .vdot{background:#f87171;box-shadow:0 0 8px #f87171;animation:pulse 1.1s infinite}
  header {
    padding: 6px 12px; background:#0d111a; border-bottom: 1px solid #1c2230;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; color:#8b95a7;
  }
  header b { color:#d7dde8; } header .busy { color:#fbbf24; }
  h2 { font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:#5f6b80;
       margin:10px 12px 4px; font-weight:700; }
  #tasks, #grid { display:grid; grid-template-columns:1fr; gap:6px; padding:0 8px; }
  /* task board rows */
  .task {
    border:1px solid #1c2230; border-radius:8px; padding:7px 9px; background:#0f1117;
    display:flex; flex-direction:column; gap:4px;
  }
  .task.active { border-color:#26405f; box-shadow:0 0 0 1px #1d3a5a55; }
  .task.bad { border-color:#5b2026; box-shadow:0 0 0 1px #7a262e55, 0 0 14px #f8717118; }
  .trow { display:flex; align-items:center; gap:7px; }
  .goal { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .pill { font-size:10px; padding:1px 7px; border-radius:999px; white-space:nowrap; font-weight:600; }
  .p-running,.p-assigned{ color:#bfe0ff; background:#13263d; }
  .p-verifying{ color:#dcc7ff; background:#241a3a; }
  .p-self-healing{ color:#ffd9a8; background:#33240f; }
  .p-verified,.p-done{ color:#031; background:#34d399; }
  .p-queued,.p-cancelled{ color:#9fb0c9; border:1px solid #2a3346; }
  .p-waiting{ color:#fcd96b; background:#2c2410; }
  .p-unplaceable,.p-failed,.p-unverified,.p-stuck\?{ color:#0b0e14; background:#f87171; }
  .cost{ font-size:10px; color:#7f8aa0; margin-left:auto; white-space:nowrap; }
  .narr{ color:#7fb0e0; font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .narr.evi{ color:#79d2a6; } .narr.err{ color:#ef9aa2; }
  .who{ font-size:10px; color:#6b7689; }
  /* node cards */
  .node { border:1px solid #1c2230; border-radius:8px; padding:7px 9px; background:#0f1117;
          display:flex; flex-direction:column; gap:3px; }
  .node.busy { border-color:#f59e0b; box-shadow:0 0 0 1px #f59e0b55, 0 0 12px #f59e0b22; }
  .row1 { display:flex; align-items:center; gap:7px; }
  .name { font-weight:600; }
  .badge { font-size:10px; padding:1px 6px; border-radius:999px; border:1px solid #2a3346; color:#9fb0c9; }
  .badge.gpu { color:#6ee7b7; border-color:#134e3a; background:#0b231b; }
  .npill { font-size:10px; padding:1px 7px; border-radius:999px; margin-left:auto; }
  .npill.idle{ color:#7f8aa0; border:1px solid #2a3346; }
  .npill.busy{ color:#0b0e14; background:#fbbf24; font-weight:700; animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .meta { color:#6b7689; font-size:10.5px; }
  .ntask { color:#e8c98b; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .empty { color:#5b6678; padding:12px; text-align:center; }
  footer { color:#5b6678; font-size:10px; padding:6px 12px; text-align:center; }
</style>
</head>
<body>
<div id="verdict" class="warn"><span class="vdot"></span><span id="vtext">connecting…</span></div>
<header>
  <span><b id="nworkers">–</b> nodes</span>
  <span><b id="ncores">–</b> cores</span>
  <span><b id="ngpus">–</b> GPUs</span>
  <span class="busy" id="nbusy"></span>
</header>
<h2 id="tasks-h">Tasks</h2>
<div id="tasks"></div>
<h2>Nodes</h2>
<div id="grid"></div>
<footer id="foot">connecting…</footer>
<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";
const H = TOKEN ? { Authorization: "Bearer " + TOKEN } : {};
const FRESH = 45;
const ACTIVE = new Set(["running","assigned","queued","verifying","self-healing"]);

function gpuLabel(c) {
  const n = c.gpu_count || 0;
  if (n) return `${n}× ${(c.gpu && c.gpu[0] || "").replace("NVIDIA ", "").replace("GeForce ", "")}`;
  if (c.docker_gpu) return "GPU (docker)";
  return "";
}
function costLabel(cost) {
  if (!cost) return "";
  const t = cost.tokens_used || 0;
  if (!t && cost.cost_est_usd === 0) return "";
  const tk = t >= 1000 ? (t/1000).toFixed(1)+"k" : t;
  let s = `~$${(cost.cost_est_usd||0).toFixed(3)} · ${tk} tok`;
  if (cost.budget_pct != null) s += ` · ${cost.budget_pct}% budget`;
  return s;
}
function nameOf(workers, id){ const w = workers.find(x=>x.id===id); return w? w.name : (id?id.slice(0,8):""); }

async function tick() {
  try {
    const r = await fetch("/derived?limit=40", { headers: H });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const workers = d.workers || [], runs = d.runs || [];

    // L0 verdict bar
    const v = d.fleet_verdict || {level:"ok", summary:""};
    const vb = document.getElementById("verdict");
    vb.className = v.level || "ok";
    document.getElementById("vtext").textContent = v.summary || "";

    // header counts
    const now = Date.now()/1000;
    const live = workers.filter(w => (now - w.last_seen) < FRESH || w.status === "busy");
    let cores=0, gpus=0, busy=0;
    live.forEach(w=>{ const c=w.capabilities||{}; cores+=c.cpus||0; gpus+=c.gpu_count||0; if(w.status==="busy")busy++; });
    document.getElementById("nworkers").textContent = live.length;
    document.getElementById("ncores").textContent = cores;
    document.getElementById("ngpus").textContent = gpus;
    document.getElementById("nbusy").textContent = busy ? `● ${busy} working` : "";

    // task board — active first, then recent terminal; skip captain anchors
    const board = runs.filter(x => x.goal);
    board.sort((a,b)=>{
      const aa = ACTIVE.has(a.phase)?0:1, bb = ACTIVE.has(b.phase)?0:1;
      if (aa!==bb) return aa-bb;
      return (b.created_at||0)-(a.created_at||0);
    });
    const tb = document.getElementById("tasks");
    tb.innerHTML = "";
    document.getElementById("tasks-h").textContent = `Tasks (${board.length})`;
    if (!board.length) tb.innerHTML = '<div class="empty">no recent tasks — say <b>roost do "…"</b> to run one</div>';
    for (const t of board.slice(0, 24)) {
      const h = t.health || {status:t.phase, reason:""};
      const bad = ["unplaceable","failed","unverified","stuck?"].includes(h.status);
      const div = document.createElement("div");
      div.className = "task" + (ACTIVE.has(t.phase)?" active":"") + (bad?" bad":"");
      const narrCls = h.status==="verified"?"evi":(bad?"err":"");
      const narr = (t.phase==="verified"||t.phase==="succeeded") ? (t.evidence||t.result||"") :
                   (bad ? (h.reason||t.result||"") : (t.narration||h.reason||""));
      div.innerHTML =
        `<div class="trow">
           <span class="pill p-${(t.phase||'queued').replace('?','\\?')}">${(t.phase||'').toUpperCase()}</span>
           <span class="goal">${t.goal}</span>
           <span class="cost">${costLabel(t.cost)}</span>
         </div>
         <div class="trow">
           <span class="pill p-${h.status.replace('?','\\?')}">${h.status}</span>
           ${t.worker?`<span class="who">${nameOf(workers,t.worker)}</span>`:""}
           <span class="narr ${narrCls}">${(narr||"").replace(/\s+/g,' ').slice(0,160)}</span>
         </div>`;
      tb.appendChild(div);
    }

    // node cards
    const cur = {};
    for (const t of runs) if (ACTIVE.has(t.phase) && t.worker) cur[t.worker] = t;
    live.sort((a,b)=>(b.capabilities.cpus||0)-(a.capabilities.cpus||0));
    const grid = document.getElementById("grid"); grid.innerHTML = "";
    for (const w of live) {
      const c = w.capabilities||{}; const job = cur[w.id]; const isBusy = w.status==="busy" || !!job;
      const gl = gpuLabel(c);
      const div = document.createElement("div");
      div.className = "node" + (isBusy?" busy":"");
      let inner = `<div class="row1"><span class="name">${w.name}</span>
        <span class="badge ${c.gpu_count||c.docker_gpu?'gpu':''}">${gl||(c.cpus||0)+'c'}</span>
        <span class="npill ${isBusy?'busy':'idle'}">${isBusy?'BUSY':'idle'}</span></div>`;
      if (job) inner += `<div class="ntask">▶ ${job.goal}</div>`;
      else { const load=c.load||{}; inner += `<div class="meta">${c.cpus||0} cores${gl?'  ·  '+gl:''}${load.free_vram_gb!=null?'  ·  '+load.free_vram_gb+'GB free':''}</div>`; }
      div.innerHTML = inner; grid.appendChild(div);
    }
    document.getElementById("foot").textContent = "updated " + new Date().toLocaleTimeString();
  } catch (e) {
    const vb = document.getElementById("verdict"); vb.className="alert";
    document.getElementById("vtext").textContent = "control plane unreachable — " + e.message;
    document.getElementById("foot").textContent = "retrying…";
  }
}
tick(); setInterval(tick, 1500);
</script>
</body>
</html>
